<div class="container">
  <div class="row align-items-end">
    <div class="col ">
      <button mat-raised-button (click)="addData()" class="demo-button">
        Add Team
      </button>
    </div>

    <mat-form-field class="col">
      <!-- <input matInput type="text" placeholder="Filter" (keyup)="applyFilter($event.target.value)"> -->
      <input matInput type="text" placeholder="Filter" (keyup)="applyFilter($event)">
    </mat-form-field>
  </div>
  <form [formGroup]="editForm2">
    <div class="mat-elevation-z8">
      <table mat-table class="full-width-table table align-middle mb-0 bg-white " matSort aria-label="Elements"
        [dataSource]="dataSource">

        <!-- First Name Column -->
        <!-- <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
                <td mat-cell *matCellDef="let row;">
                  <input [formControl]="row.validator.get('id')" type="text" matInput [readonly]="!row.editable">
                </td>
              </ng-container> -->



        <!-- First Name Column -->
        <!-- <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name</th>
      <td mat-cell *matCellDef="let row;" [routerLink]="['../team-home', row.currentData.id]">
       <td mat-cell (click)="navigate(row)" *matCellDef="let row;" routerLink="../team-home" [queryParams]='{id: row.currentData.id, name:row.currentData.name}'> -->
        <!-- <a routerLink='../team-home/{{row.currentData.name}}' [state]="{ orderId: 1234 }" class="link-primary"><input [formControl]="row.validator.get('name')" type="text" matInput [readonly]="true"></a> 
        <a class="link-primary"><input [formControl]="row.validator.get('name')" type="text" matInput [readonly]="true"></a>
      </td>
    </ng-container> -->

        <!-- Last Name Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>id</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('id')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>
        <!-- StartDate Column -->
        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>startDate</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('startDate')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>

        <!-- EndDate Column -->
        <ng-container matColumnDef="endDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>endDate</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('endDate')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>

        <!-- Title Column -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>title</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('title')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>description</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('description')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>

        <!-- Priority Column -->
        <ng-container matColumnDef="priorityId">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>priorityId</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('priorityId')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>

        <!-- StateID Column -->
        <ng-container matColumnDef="stateId">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>stateId</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('stateId')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>

        <!-- TeamId Column -->
        <ng-container matColumnDef="teamId">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>teamId</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('teamId')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>




        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>action</th>
          <td mat-cell *matCellDef="let row; let i = index" (click)="$event.stopPropagation()">
            <span style="display: flex;">
              <button *ngIf="!row.editable" mat-icon-button color="primary" focusable="false" (click)="startEdit(row)">
                <mat-icon>edit</mat-icon>
              </button>
              <button *ngIf="row.editable" mat-icon-button color="primary" focusable="false"
                (click)="confirmEditCreate(row)">
                <mat-icon>check</mat-icon>
              </button>
              <button mat-icon-button color="warn" focusable="false" (click)="cancelOrDelete(row, i)">
                <mat-icon>{{row.editable ? 'close' : 'delete'}}</mat-icon>
              </button>
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="row.editable ? 'editable' : 'readonly'">
        </tr>
        <!-- <tr mat-row (click)="SelectTeam(row)" *matRowDef="let row; columns: displayedColumns;" [ngClass]="row.editable ? 'editable' : 'readonly'"></tr> -->

      </table>
      <!-- <mat-paginator #paginator
      [length]="dataSource.data.length"
      [pageIndex]="0"
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20]">
  </mat-paginator> -->
      <mat-paginator #paginator [length]="6" [pageIndex]="0" [pageSize]="5" [pageSizeOptions]="[5, 10, 20]">
      </mat-paginator>
    </div>
  </form>
</div>
