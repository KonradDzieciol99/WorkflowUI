<mat-form-field>
    <!-- <input matInput type="text" placeholder="Filter" (keyup)="applyFilter($event.target.value)"> -->
  <input matInput type="text" placeholder="Filter" (keyup)="applyFilter($event)">
  </mat-form-field>
    <div class="edit-users  mat-elevation-z8">
      <table mat-table class="full-width-table table align-middle mb-0 bg-white " matSort aria-label="Elements" [dataSource]="dataSource">
        
                <!-- First Name Column -->
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
                    <td mat-cell *matCellDef="let row;">
                      <input [formControl]="row.validator.get('id')" type="text" matInput [readonly]="!row.editable">
                    </td>
                  </ng-container>


        <!-- First Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Name</th>
          <td mat-cell *matCellDef="let row;" (click)="$event.stopPropagation()">
            <input [formControl]="row.validator.get('name')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>
<!-- 
        Last Name Column
        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
          <td mat-cell *matCellDef="let row">
            <input [formControl]="row.validator.get('lastName')" type="text" matInput [readonly]="!row.editable">
          </td>
        </ng-container>
 -->

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Action</th>
          <td mat-cell *matCellDef="let row; let i = index" (click)="$event.stopPropagation()">
            <span style="display: flex;">
              <button *ngIf="!row.editable" mat-icon-button  color="primary" focusable="false" (click)="startEdit(row)">
                <mat-icon>edit</mat-icon>
              </button>
              <button *ngIf="row.editable" mat-icon-button  color="primary" focusable="false" (click)="confirmEditCreate(row)">
                <mat-icon>check</mat-icon>
              </button>
              <button mat-icon-button color="warn" focusable="false" (click)="cancelOrDelete(row, i)">
                <mat-icon>{{row.editable ? 'close' : 'delete'}}</mat-icon>
              </button>
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="row.editable ? 'editable' : 'readonly'"></tr>
        <!-- <tr mat-row (click)="SelectTeam(row)" *matRowDef="let row; columns: displayedColumns;" [ngClass]="row.editable ? 'editable' : 'readonly'"></tr> -->

      </table>

      <mat-paginator #paginator
